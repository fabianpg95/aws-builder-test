<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ultimate SmartUploader</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; }
  input, button { padding: 0.5rem; margin-top: 1rem; width: 100%; }
  #status { margin-top: 1rem; }
</style>
</head>
<body>
<h1>Upload your file</h1>
<input type="file" id="fileInput" />
<button id="uploadBtn">Upload</button>
<div id="status"></div>

<script>
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');
const statusDiv = document.getElementById('status');

uploadBtn.addEventListener('click', async () => {
  if (!fileInput.files.length) {
    statusDiv.textContent = 'Please select a file.';
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = async (e) => {
    const base64Content = e.target.result.split(',')[1]; // remove prefix
    const payload = {
      file_name: file.name,
      file_content: base64Content,
    };

    statusDiv.textContent = 'Uploading...';

    try {
      const response = await fetch('https://YOUR_API_GATEWAY_ENDPOINT/upload', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          // Authorization: 'Bearer YOUR_COGNITO_JWT_TOKEN' // if Cognito enabled
        },
        body: JSON.stringify(payload),
      });

      const data = await response.json();
      if (response.ok) {
        statusDiv.textContent = `Upload successful! File ID: ${data.file_id}`;
      } else {
        statusDiv.textContent = `Upload failed: ${data.message || 'Unknown error'}`;
      }
    } catch (err) {
      statusDiv.textContent = `Error: ${err.message}`;
    }
  };

  reader.readAsDataURL(file);
});
</script>
</body>
</html>
